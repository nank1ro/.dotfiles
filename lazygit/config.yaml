git:
  pagers:
    - pager: delta --paging=never --line-numbers --features=colibri
      colorArg: always
  ignoreWhitespaceInDiffView: true
  # commitPrefix:
  #   - pattern: "^(\\w+)/(\\d+)-(.*)"
  #     replace: "$1: $2 $3"
  #   - pattern: "^([^_]+)_.*"
  #     replace: "($1) "
os:
  editPreset: "nvim-remote"
promptToReturnFromSubprocess: false # removes "press enter to return to lazygit" popup
gui:
  nerdFontsVersion: "3"
notARepository: "skip"
customCommands:
  - key: "E"
    description: "Add empty commit"
    context: "commits"
    command: 'git commit --allow-empty -m "empty commit"'
    loadingText: "Committing empty commit..."
  - key: "<c-a>" # ctrl + a
    description: "pick AI commit"
    command: |
      if [ "{{.Form.Action}}" = "edit" ]; then
        echo "{{.Form.Msg}}" > .git/COMMIT_EDITMSG && nvim .git/COMMIT_EDITMSG && [ -s .git/COMMIT_EDITMSG ] && git commit -F .git/COMMIT_EDITMSG || echo "Commit message is empty, commit aborted."
      else
        git commit -m "{{.Form.Msg}}"
      fi
    context: "files"
    output: terminal
    prompts:
      - type: "menuFromCommand"
        title: "AI Commit Messages"
        key: "Msg"
        command: "lazycommit commit"
        filter: "^(?P<raw>.+)$"
        valueFormat: "{{ .raw }}"
        labelFormat: "{{ .raw | green }}"
      - type: "menu"
        title: "Choose Action"
        key: "Action"
        options:
          - name: "Commit directly"
            description: "Use this message as-is"
            value: "direct"
          - name: "Edit before commit"
            description: "Open in editor first"
            value: "edit"
